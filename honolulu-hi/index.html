<!-- CREDENTIALS BAR WITH IMAGES CONNECTED -->
<div class="credentials-bar">
  <div class="credentials-inner">
    
    <!-- Box 1: Three Best Rated -->
    <div class="cred-box three-best">
      <img src="../download.jpg" alt="Three Best Rated Certification" class="cred-img-asset">
      <div class="cred-title-text">
        <span class="cred-subhead">Three Best Rated</span>
        <span class="cred-mainhead">Tax Services · Hawaii</span>
      </div>
    </div>

    <!-- Box 2: IRS Enrolled Agent -->
    <div class="cred-box ea">
      <img src="../download-1.jpg" alt="IRS Enrolled Agent Logo" class="cred-img-asset">
      <div class="cred-title-text">
        <span class="cred-subhead">Federally Credentialed</span>
        <span class="cred-mainhead">IRS Enrolled Agent</span>
      </div>
    </div>

    <!-- Box 3: IRS Authorized e-File Provider -->
    <div class="cred-box efile">
      <img src="../download.png" alt="IRS Authorized e-File Provider" class="cred-img-asset">
      <div class="cred-title-text">
        <span class="cred-subhead">IRS Authorized</span>
        <span class="cred-mainhead">e-File Provider</span>
      </div>
    </div>

    <!-- Box 4: Registered Tax Return Preparer -->
    <div class="cred-box reg">
      <img src="../irs-logo-png.png" alt="IRS Registered Tax Return Preparer Logo" class="cred-img-asset">
      <div class="cred-title-text">
        <span class="cred-subhead">IRS Registered</span>
        <span class="cred-mainhead">Tax Return Preparer</span>
      </div>
    </div>

  </div>
</div>

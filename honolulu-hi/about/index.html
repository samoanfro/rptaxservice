<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet the Team | RP Tax Service — Honolulu, Hawaii</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#4E9FB0; --teal-dark:#3D8A9A; --teal-deeper:#2F7283;
  --teal-pale:#EBF7F9; --navy:#1C3050; --text-body:#3D5060;
  --border-sub:rgba(28,48,80,0.09); --shadow-sm:0 2px 12px rgba(28,48,80,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans 3',sans-serif;background:#fff;color:var(--text-body);line-height:1.7;}
nav{background:#fff;border-bottom:3px solid var(--teal);padding:0;box-shadow:var(--shadow-sm);}
.nav-inner{max-width:1120px;margin:0 auto;padding:0 32px;display:flex;align-items:center;height:70px;}
.nav-back{color:var(--teal-dark);text-decoration:none;font-weight:600;font-size:14px;}
.container{max-width:1120px;margin:0 auto;padding:88px 32px;}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:52px;}
.team-card{background:#fff;border:1px solid var(--border-sub);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
.team-photo{width:100%;aspect-ratio:4/3;background:var(--teal-pale);overflow:hidden;}
.team-photo img{width:100%;height:100%;object-fit:cover;}
.team-info{padding:28px 32px;}
.team-name{font-family:'Libre Baskerville',serif;font-size:26px;color:var(--navy);margin-bottom:4px;}
.team-title{font-size:14px;color:var(--teal-dark);font-weight:500;text-transform:uppercase;margin-bottom:16px;}
@media(max-width:768px){.team-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/honolulu-hi/" class="nav-back">← Back to Home</a>
  </div>
</nav>

<div class="container">
  <h2>The People Behind RP Tax Service</h2>
  <div class="team-grid">
    <!-- ROBERT -->
    <div class="team-card">
      <div class="team-photo">
        <img src="https://samoanfro.github.io/rptaxservice/Robert.jpg" alt="Robert Purcell">
      </div>
      <div class="team-info">
        <div class="team-name">Robert Purcell</div>
        <div class="team-title">Tax Advisor · IRS Enrolled Agent</div>
        <p>Robert began his tax preparation career in California... [Bio content]</p>
      </div>
    </div>
    <!-- JACOB -->
    <div class="team-card">
      <div class="team-photo">
        <img src="https://samoanfro.github.io/rptaxservice/Jacob.jpeg" alt="Jacob Siaosi">
      </div>
      <div class="team-info">
        <div class="team-name">Jacob Siaosi</div>
        <div class="team-title">Tax Advisor · IRS Enrolled Agent</div>
        <p>Jacob, an Enrolled Agent with the IRS, has been an integral part of RP Tax...</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
